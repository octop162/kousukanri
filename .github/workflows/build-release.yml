name: Build and Release Executable

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build and Release for Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build GUI
        run: |
          uv run python -m nuitka --standalone --enable-plugin=pyside6 --windows-console-mode=disable --windows-icon-from-ico=icon.ico --output-dir=dist --output-filename=kousu-kanri-gui.exe --assume-yes-for-downloads main.py

      - name: Build CLI
        run: |
          uv run python -m nuitka --standalone --windows-icon-from-ico=icon.ico --output-dir=dist --output-filename=kousu-kanri.exe --assume-yes-for-downloads cli.py

      - name: Prepare release assets
        run: |
          Copy-Item dist/cli.dist/kousu-kanri.exe dist/main.dist/kousu-kanri.exe
          Copy-Item dist/cli.dist/*.dll dist/main.dist/ -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path dist/main.dist/data -Force
          Compress-Archive -Path dist/main.dist/* -DestinationPath kousukanri-windows.zip
        shell: pwsh

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: kousukanri-windows.zip
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
